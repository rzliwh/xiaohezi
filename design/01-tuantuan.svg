<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <!-- 脸渐变：奶白偏暖 -->
    <radialGradient id="faceG" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FFFCEF"/>
      <stop offset="70%" stop-color="#FCEFD6"/>
      <stop offset="100%" stop-color="#E8D4B0"/>
    </radialGradient>
    <!-- 耳朵外侧 -->
    <linearGradient id="earG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5E0"/>
      <stop offset="100%" stop-color="#E8D4B0"/>
    </linearGradient>
    <!-- 耳朵内侧粉 -->
    <radialGradient id="earInner" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#FFD0D8"/>
      <stop offset="100%" stop-color="#F5A0B0"/>
    </radialGradient>
    <!-- 腮红：实色粉圆 -->
    <radialGradient id="cheekG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB0BC" stop-opacity="1"/>
      <stop offset="70%" stop-color="#FFB0BC" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFB0BC" stop-opacity="0"/>
    </radialGradient>
    <!-- 鼻子桃心渐变 -->
    <radialGradient id="noseG" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FF8A9A"/>
      <stop offset="100%" stop-color="#D96070"/>
    </radialGradient>
    <!-- 圣诞帽红 -->
    <linearGradient id="hatG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6868"/>
      <stop offset="100%" stop-color="#C82828"/>
    </linearGradient>
  </defs>

  <!-- ==================== 耳朵（底层，先画） ==================== -->
  <!-- 左耳：圆润三角、底宽顶尖、内缘倾斜 -->
  <path d="M 42 56
           Q 38 30 48 24
           Q 58 30 58 56
           Q 50 60 42 56 Z"
        fill="url(#earG)" stroke="#B89878" stroke-width="1.4"/>
  <!-- 左内耳 -->
  <path d="M 47 52
           Q 45 36 50 32
           Q 54 36 53 52
           Q 50 54 47 52 Z"
        fill="url(#earInner)"/>

  <!-- 右耳 -->
  <path d="M 118 56
           Q 122 30 112 24
           Q 102 30 102 56
           Q 110 60 118 56 Z"
        fill="url(#earG)" stroke="#B89878" stroke-width="1.4"/>
  <!-- 右内耳 -->
  <path d="M 113 52
           Q 115 36 110 32
           Q 106 36 107 52
           Q 110 54 113 52 Z"
        fill="url(#earInner)"/>

  <!-- ==================== 脸（圆胖头） ==================== -->
  <ellipse cx="80" cy="92" rx="48" ry="44"
           fill="url(#faceG)" stroke="#B89878" stroke-width="1.5"/>

  <!-- 脸底部暗化（趴桌感）-->
  <ellipse cx="80" cy="128" rx="40" ry="8" fill="#000" opacity="0.1"/>

  <!-- ==================== 眼睛（大眼白 + 黑瞳 + 双高光） ==================== -->
  <!-- 左眼 -->
  <ellipse cx="64" cy="84" rx="7" ry="9" fill="#FFFFFF" stroke="#5D4037" stroke-width="1.2"/>
  <ellipse cx="64" cy="85" rx="5" ry="7" fill="#1A1A1A"/>
  <circle cx="66" cy="82" r="2.2" fill="#FFFFFF"/>
  <circle cx="62" cy="88" r="0.9" fill="#FFFFFF" opacity="0.7"/>

  <!-- 右眼 -->
  <ellipse cx="96" cy="84" rx="7" ry="9" fill="#FFFFFF" stroke="#5D4037" stroke-width="1.2"/>
  <ellipse cx="96" cy="85" rx="5" ry="7" fill="#1A1A1A"/>
  <circle cx="98" cy="82" r="2.2" fill="#FFFFFF"/>
  <circle cx="94" cy="88" r="0.9" fill="#FFFFFF" opacity="0.7"/>

  <!-- ==================== 腮红（圆形实色，贴眼下） ==================== -->
  <circle cx="48" cy="98" r="7" fill="url(#cheekG)"/>
  <circle cx="112" cy="98" r="7" fill="url(#cheekG)"/>
  <ellipse cx="48" cy="98" rx="5" ry="4" fill="#FFB0BC" opacity="0.5"/>
  <ellipse cx="112" cy="98" rx="5" ry="4" fill="#FFB0BC" opacity="0.5"/>

  <!-- ==================== 鼻子+嘴（一体 Y 形） ==================== -->
  <!-- 桃心鼻头 -->
  <path d="M 80 100
           C 76 97, 73 100, 75 103
           C 77 105, 80 106, 80 106
           C 80 106, 83 105, 85 103
           C 87 100, 84 97, 80 100 Z"
        fill="url(#noseG)" stroke="#9A4A55" stroke-width="0.7"/>

  <!-- 鼻下人中线 -->
  <path d="M 80 106 L 80 112"
        stroke="#5D4037" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- 嘴：人字分两瓣（微笑） -->
  <path d="M 80 112 Q 76 115 73 113"
        stroke="#5D4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 80 112 Q 84 115 87 113"
        stroke="#5D4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ==================== 胡须（3 根 × 2 侧、向外散、轻微弧线） ==================== -->
  <!-- 左侧 -->
  <path d="M 62 100 Q 48 98 38 95"
        stroke="#5D4037" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 62 104 Q 48 104 36 104"
        stroke="#5D4037" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 62 108 Q 48 112 38 118"
        stroke="#5D4037" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- 右侧 -->
  <path d="M 98 100 Q 112 98 122 95"
        stroke="#5D4037" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 98 104 Q 112 104 124 104"
        stroke="#5D4037" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 98 108 Q 112 112 122 118"
        stroke="#5D4037" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ==================== 头顶：歪戴的小圣诞帽 ==================== -->
  <!-- 帽身：歪一点、不遮眼睛 -->
  <path d="M 56 44
           Q 78 18 102 32
           Q 106 40 102 50
           Q 80 52 60 50
           Q 52 46 56 44 Z"
        fill="url(#hatG)" stroke="#8A1818" stroke-width="1"/>
  <!-- 帽檐白边 -->
  <ellipse cx="80" cy="50" rx="22" ry="4" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="0.7"/>
  <!-- 帽顶绒球 -->
  <circle cx="92" cy="22" r="6" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="0.7"/>
  <circle cx="90" cy="20" r="1.8" fill="#FFFFFF" opacity="0.9"/>
</svg>
