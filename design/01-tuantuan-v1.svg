<?xml version="1.0" encoding="UTF-8"?>
<!--
  团团 — 奶白糯米猫
  参考风格：Neko Atsume 橘猫（圆身+三角耳+大眼+小鼻+W形嘴+胡须）
  viewBox: 160x160（与 game 一致）
  用法：直接拖到浏览器打开预览；CC 可参照此结构改写 script.js 中对应角色的 bodySVG/eyesSVG/accessorySVG

  色板：
    primary: #FFF5E8  主体
    shadow : #E0CEB0  描边/阴影
    accent : #F5E5C8  内耳/次要面
    cheek  : #FFAB91  腮红
    eyeDark: #4A2C20  瞳孔
    nose   : #C08070  小三角鼻
    scarf  : #E88070  围巾

  表情变体预留：
    idle   : 当前状态
    happy  : 眼睛改笑弧（已在 SVG 注释中标出替换点）
    sleepy : 眼睛改横线
    shy    : 眼睛缩小、腮红加深（通过 .char-eyes 和 .char-cheeks 的 opacity/scaleY 控制）
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="320" height="320">
  <defs>
    <!-- 主体右上高光 -->
    <radialGradient id="bodyGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <!-- 底部暗化（增加体积感） -->
    <radialGradient id="bodyShade" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#E0CEB0" stop-opacity="0"/>
      <stop offset="80%" stop-color="#E0CEB0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E0CEB0" stop-opacity="0.25"/>
    </radialGradient>
    <!-- 腮红径向渐变（更柔） -->
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAB91" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFAB91" stop-opacity="0"/>
    </radialGradient>
    <!-- 地面阴影 -->
    <radialGradient id="groundShadow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <!-- 整体投影 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 地面阴影 -->
  <ellipse cx="80" cy="142" rx="38" ry="8" fill="url(#groundShadow)"/>

  <!-- 身体组合（带投影） -->
  <g filter="url(#softShadow)">
    <!-- 圆身主体 -->
    <ellipse cx="80" cy="84" rx="52" ry="50" fill="#FFF5E8" stroke="#E0CEB0" stroke-width="2.2"/>

    <!-- 三角耳（外侧，primary 色） -->
    <path d="M40 50 L32 24 L60 44 Z" fill="#FFF5E8" stroke="#E0CEB0" stroke-width="2" stroke-linejoin="round"/>
    <path d="M120 50 L128 24 L100 44 Z" fill="#FFF5E8" stroke="#E0CEB0" stroke-width="2" stroke-linejoin="round"/>

    <!-- 三角耳（内侧，accent 色，透出粉色） -->
    <path d="M40 50 L32 24 L46 36 Z" fill="#F5E5C8" opacity="0.6"/>
    <path d="M120 50 L128 24 L114 36 Z" fill="#F5E5C8" opacity="0.6"/>
  </g>

  <!-- 主体右上高光 -->
  <ellipse cx="68" cy="60" rx="32" ry="28" fill="url(#bodyGrad)"/>

  <!-- 底部暗化 -->
  <ellipse cx="80" cy="82" rx="52" ry="50" fill="url(#bodyShade)"/>

  <!-- 腮红（径向渐变，柔和过渡） -->
  <ellipse cx="52" cy="86" rx="10" ry="6" fill="url(#cheekGrad)"/>
  <ellipse cx="108" cy="86" rx="10" ry="6" fill="url(#cheekGrad)"/>

  <!-- 头顶装饰：小帽子 -->
  <g>
    <ellipse cx="80" cy="22" rx="22" ry="5" fill="#D88" opacity="0.6"/>
    <path d="M62 22 Q60 6 80 4 Q100 6 98 22 Z" fill="#E55" stroke="#B33" stroke-width="1.4"/>
    <circle cx="80" cy="6" r="3.5" fill="#fff" stroke="#B33" stroke-width="1.2"/>
  </g>

  <!-- 眼睛（idle 状态：圆形大眼，idle/happy/sleepy 切换注释在下面） -->
  <g class="char-eyes">
    <!-- ===== idle 状态：圆眼 ===== -->
    <ellipse cx="60" cy="72" rx="6" ry="7.5" fill="#4A2C20"/>
    <ellipse cx="100" cy="72" rx="6" ry="7.5" fill="#4A2C20"/>
    <!-- 主高光 -->
    <circle cx="62.5" cy="69" r="2.5" fill="#fff"/>
    <circle cx="102.5" cy="69" r="2.5" fill="#fff"/>
    <!-- 副高光（小一点，更灵动） -->
    <circle cx="58" cy="75" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="98" cy="75" r="1" fill="#fff" opacity="0.7"/>

    <!--
      ===== happy 状态：把上面 4 个 ellipse 替换为下面两段 =====
      <path d="M52 70 Q60 78 68 70" fill="none" stroke="#4A2C20" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M92 70 Q100 78 108 70" fill="none" stroke="#4A2C20" stroke-width="2.2" stroke-linecap="round"/>

      ===== sleepy 状态：替换为 =====
      <path d="M52 72 Q60 76 68 72" fill="none" stroke="#4A2C20" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M92 72 Q100 76 108 72" fill="none" stroke="#4A2C20" stroke-width="2.2" stroke-linecap="round"/>
    -->
  </g>

  <!-- 鼻：小三角（拟 Neko 风格） -->
  <path d="M80 84 L76 87 L84 87 Z" fill="#C08070"/>

  <!-- W 形嘴（鼻下两条小弧线） -->
  <g stroke="#4A2C20" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M80 88 Q80 92 76 92"/>
    <path d="M80 88 Q80 92 84 92"/>
  </g>

  <!-- 胡须（每边 2 根） -->
  <g stroke="#E0CEB0" stroke-width="1.4" stroke-linecap="round" opacity="0.7" fill="none">
    <path d="M48 88 Q40 88 32 86"/>
    <path d="M48 92 Q40 94 32 94"/>
    <path d="M112 88 Q120 88 128 86"/>
    <path d="M112 92 Q120 94 128 94"/>
  </g>
</svg>
